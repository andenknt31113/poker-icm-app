name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # playground は @poker-icm/core の dist を参照するため、typecheck より先に core をビルド
      - name: Build core
        run: npm -w @poker-icm/core run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers (Chromium)
        run: npx --prefix playground playwright install chromium --with-deps

      - name: E2E
        run: npm -w @poker-icm/playground run e2e
